<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>VTU Exam Timetable</title>

  <meta name="theme-color" content="#1E3A8A" />
  <meta
    name="description"
    content="UG Examination Timetable June-July 2026"
  />

  <link rel="manifest" href="manifest.json" />

  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta
    name="apple-mobile-web-app-title"
    content="VTU Timetable"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f3f4f6;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    thead {
      background: linear-gradient(to right, #1e3a8a, #312e81);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody tr {
      border-bottom: 1px solid #e5e7eb;
      transition: 0.2s;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .online {
      background: #10b981;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .latest-card {
      background: #eff6ff;
      border-left: 4px solid #2563eb;
    }

    .edit-icon-btn {
      opacity: 0;
      transition: 0.2s;
      cursor: pointer;
    }

    tr:hover .edit-icon-btn {
      opacity: 1;
    }

    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div class="max-w-7xl mx-auto px-4 py-6">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold text-blue-900">
        VTU Exam Timetable
      </h1>

      <div class="flex items-center gap-3 mt-2 text-sm text-gray-600">
        <span class="flex items-center gap-2">
          <span class="status-dot online"></span>
          Connected
        </span>

        <span>
          Last Sync:
          <span id="lastSync">—</span>
        </span>
      </div>
    </div>

    <div class="flex gap-3">
      <button
        id="refreshBtn"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg"
      >
        Refresh
      </button>

      <button
        id="adminBtn"
        class="bg-amber-500 text-white px-4 py-2 rounded-lg"
      >
        Admin
      </button>
    </div>
  </div>

  <div id="latestChangesPanel" class="mb-5 hidden">
    <h2 class="font-bold mb-3 text-lg">
      Latest Updates
    </h2>

    <div id="changesList" class="space-y-2"></div>
  </div>

  <div
    id="adminPanel"
    class="hidden bg-white rounded-xl p-5 shadow mb-6"
  >
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">

      <input
        type="text"
        id="newCourse"
        placeholder="Course"
        class="border p-2 rounded"
      />

      <input
        type="text"
        id="newSem"
        placeholder="Semester"
        class="border p-2 rounded"
      />

      <input
        type="text"
        id="newScheme"
        placeholder="Scheme"
        class="border p-2 rounded"
      />

      <input
        type="date"
        id="newTheoryStart"
        class="border p-2 rounded"
      />

      <input
        type="date"
        id="newTheoryEnd"
        class="border p-2 rounded"
      />

      <input
        type="date"
        id="newResultDay"
        class="border p-2 rounded"
      />

      <input
        type="text"
        id="newRemark"
        placeholder="Remark"
        class="border p-2 rounded"
      />

      <button
        id="addEntryBtn"
        class="bg-green-600 text-white rounded"
      >
        Add Entry
      </button>

    </div>
  </div>

  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <div class="table-wrapper">

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>Course</th>
            <th>Sem</th>
            <th>Scheme</th>
            <th>Theory Start</th>
            <th>Theory End</th>
            <th>Result Day</th>
            <th>Remark</th>
            <th></th>
          </tr>
        </thead>

        <tbody id="tableBody">
          <tr>
            <td colspan="9" class="text-center py-10">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>

</div>

<div id="toast" class="toast">
  <span id="toastMsg"></span>
</div>

<script>

const DEFAULT_DATA = [
  {
    slno: 1,
    course: "B.Arch",
    sem: "2",
    scheme: "21",
    theoryStart: "16-06-2026",
    theoryEnd: "08-07-2026",
    resultDay: "29-07-2026",
    remark: ""
  },
  {
    slno: 2,
    course: "B.Arch",
    sem: "4",
    scheme: "21",
    theoryStart: "16-06-2026",
    theoryEnd: "08-07-2026",
    resultDay: "29-07-2026",
    remark: ""
  }
];

let currentData = [...DEFAULT_DATA];

let isAdmin = false;

let changeHistory = [];

function renderTable() {

  const tbody = document.getElementById('tableBody');

  let html = '';

  currentData.forEach((item, index) => {

    html += `
      <tr>

        <td>${index + 1}</td>

        <td>
          ${item.course}
        </td>

        <td>${item.sem}</td>

        <td>${item.scheme}</td>

        <td>${item.theoryStart || '—'}</td>

        <td>${item.theoryEnd || '—'}</td>

        <td>${item.resultDay || '—'}</td>

        <td>${item.remark || '—'}</td>

        <td>

          ${
            isAdmin
            ? `<button
                class="delete-row text-red-600"
                data-index="${index}">
                <i class="fas fa-trash"></i>
              </button>`
            : ''
          }

        </td>

      </tr>
    `;
  });

  tbody.innerHTML = html;

  document.querySelectorAll('.delete-row')
    .forEach(btn => {

      btn.addEventListener('click', () => {

        const index = Number(btn.dataset.index);

        currentData.splice(index, 1);

        currentData.forEach((item, i) => {
          item.slno = i + 1;
        });

        renderTable();

        showToast('Row deleted');
      });
    });
}

function renderChanges() {

  const panel = document.getElementById('latestChangesPanel');

  const list = document.getElementById('changesList');

  if (!changeHistory.length) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');

  list.innerHTML = '';

  changeHistory.forEach(change => {

    list.innerHTML += `
      <div class="latest-card p-3 rounded-lg">
        <div class="font-semibold text-sm">
          ${change}
        </div>
      </div>
    `;
  });
}

function showToast(message) {

  const toast = document.getElementById('toast');

  document.getElementById('toastMsg').innerText = message;

  toast.classList.add('show');

  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

function addNewEntry() {

  const newEntry = {

    slno: 1,

    course:
      document.getElementById('newCourse').value.trim(),

    sem:
      document.getElementById('newSem').value.trim(),

    scheme:
      document.getElementById('newScheme').value.trim(),

    theoryStart:
      document.getElementById('newTheoryStart').value,

    theoryEnd:
      document.getElementById('newTheoryEnd').value,

    resultDay:
      document.getElementById('newResultDay').value,

    remark:
      document.getElementById('newRemark').value.trim()
  };

  if (!newEntry.course) {
    showToast('Please enter course');
    return;
  }

  currentData.unshift(newEntry);

  currentData.forEach((item, index) => {
    item.slno = index + 1;
  });

  changeHistory.unshift(
    `➕ Added ${newEntry.course} Semester ${newEntry.sem}`
  );

  renderChanges();

  renderTable();

  showToast('Entry added successfully');

  document
    .querySelectorAll('#adminPanel input')
    .forEach(input => {
      input.value = '';
    });
}

function toggleAdmin() {

  isAdmin = !isAdmin;

  document
    .getElementById('adminPanel')
    .classList.toggle('hidden');

  renderTable();
}

document
  .getElementById('adminBtn')
  .addEventListener('click', toggleAdmin);

document
  .getElementById('addEntryBtn')
  .addEventListener('click', addNewEntry);

document
  .getElementById('refreshBtn')
  .addEventListener('click', () => {

    renderTable();

    showToast('Table refreshed');
  });

document.getElementById('lastSync').innerText =
  new Date().toLocaleString();

renderTable();

</script>

</body>
</html>
